<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart | Perfume World</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loader"></div>

    <header class="page-header">
        <h1>Your Cart</h1>
        <p>Review your selected perfumes and complete your order</p>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="perfumes.html">Perfumes</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="cart.html" class="active">Cart (<span id="cart-count">0</span>)</a>

        <div class="nav-right">
            <div class="profile-box" onclick="toggleProfileMenu(event)">
                <div class="profile-icon">👤</div>

                <div class="profile-menu" id="profile-menu">
                    <div id="guest-menu">
                        <a href="login.html">Login</a>
                    </div>

                    <div id="user-menu" style="display:none;">
                        <div class="user-info">
                            <p id="nav-user-name"></p>
                            <p id="nav-user-email"></p>
                        </div>
                        <hr>
                        <a href="profile.html">My Profile</a>
                        <a href="#" onclick="logoutUser()">Logout</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <section class="cart-section">
        <div id="cart-items"></div>

        <div class="cart-summary">
            <h2>Cart Summary</h2>
            <p id="cart-total">Total: $0</p>
            <button class="clear-btn" onclick="clearCart()">Clear Cart</button>
        </div>
    </section>

    <section class="contact-section">
        <div class="contact-form-box fancy-box single-box">
            <h2>Checkout Information</h2>
            <p style="margin-bottom: 20px; color: #d2d2d2;">
                Please enter your information to complete your order.
            </p>

            <form class="contact-form" onsubmit="checkout(event)">
                <label for="full-name">Full Name</label>
                <input type="text" id="full-name" placeholder="Enter your full name" required>

                <label for="phone-number">Phone Number</label>
                <input type="text" id="phone-number" placeholder="Enter your phone number" required>

                <label for="email-address">Email Address</label>
                <input type="email" id="email-address" placeholder="Enter your email" required>

                <label for="address">Address</label>
                <input type="text" id="address" placeholder="Enter your address" required>

                <label for="city">City</label>
                <input type="text" id="city" placeholder="Enter your city" required>

                <label for="notes">Notes</label>
                <textarea id="notes" rows="5" placeholder="Write any delivery notes here"></textarea>

                <button type="submit" class="send-btn">Complete Checkout</button>
            </form>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Perfume World | Designed with elegance</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
